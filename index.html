<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unisonmusic</title>
  <script src="https://unpkg.com/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --panel: rgba(255, 255, 255, 0.1);
      --panel-strong: rgba(255, 255, 255, 0.16);
      --line: rgba(255, 255, 255, 0.18);
      --text: #f8fafc;
      --muted: #a7b0c0;
      --green: #34d399;
      --red: #fb7185;
      --blue: #60a5fa;
      --yellow: #fbbf24;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 12%, rgba(96, 165, 250, 0.28), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(52, 211, 153, 0.18), transparent 28%),
        linear-gradient(135deg, #0f172a 0%, #111827 52%, #18181b 100%);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 18px;
      animation: rise 560ms ease both;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(22px);
      padding: 22px;
    }

    .brand {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .brand p {
      max-width: 460px;
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .connection {
      min-width: 142px;
      text-align: right;
      color: var(--muted);
      font-size: 14px;
    }

    .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 8px;
      border-radius: 999px;
      background: var(--yellow);
      box-shadow: 0 0 18px currentColor;
      vertical-align: middle;
    }

    .dot.connected {
      background: var(--green);
    }

    .dot.disconnected {
      background: var(--red);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 700;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      background: rgba(15, 23, 42, 0.56);
      color: var(--text);
      outline: none;
      transition: border-color 160ms ease, background 160ms ease;
    }

    input:focus {
      border-color: rgba(96, 165, 250, 0.85);
      background: rgba(15, 23, 42, 0.74);
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      background: linear-gradient(135deg, #38bdf8, #34d399);
      color: #06121f;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease, filter 160ms ease;
      white-space: nowrap;
    }

    button.secondary {
      background: var(--panel-strong);
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.warning {
      background: linear-gradient(135deg, #fbbf24, #fb7185);
      color: #1f1306;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    button.loading {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button.icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 14px;
      font-weight: 700;
    }

    button.icon-btn svg {
      flex-shrink: 0;
      opacity: 0.85;
    }

    button.icon-btn:hover:not(:disabled) svg {
      opacity: 1;
    }

    button.icon-btn.pasted {
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(52, 211, 153, 0.25);
    }

    button.icon-btn.pasted svg {
      opacity: 1;
      stroke: var(--green);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 720ms linear infinite;
    }

    body.busy {
      overflow: hidden;
    }

    body.busy .app {
      pointer-events: none;
      user-select: none;
      filter: blur(2px) saturate(0.75);
    }

    .busy-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(2, 6, 23, 0.72);
      backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .busy-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .busy-dialog {
      width: min(360px, 100%);
      display: grid;
      justify-items: center;
      gap: 16px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      padding: 26px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.48);
      text-align: center;
    }

    .busy-ring {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background:
        conic-gradient(from 0deg, #38bdf8, #34d399, #fbbf24, #38bdf8);
      display: grid;
      place-items: center;
      animation: spin 980ms linear infinite;
    }

    .busy-ring::after {
      content: "";
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #0f172a;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .busy-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
    }

    .busy-text {
      margin: -8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .room-code {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: #e0f2fe;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .participants {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .participant {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: rgba(15, 23, 42, 0.42);
    }

    .player {
      width: 100%;
      min-height: 46px;
    }

    .track-title {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .status {
      min-height: 42px;
      border-left: 3px solid var(--blue);
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(96, 165, 250, 0.1);
      color: #dbeafe;
      line-height: 1.35;
    }

    .status.error {
      border-color: var(--red);
      background: rgba(251, 113, 133, 0.1);
      color: #ffe4e6;
    }

    .countdown {
      min-height: 64px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.18);
      font-size: 24px;
      font-weight: 900;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .brand {
        align-items: flex-start;
        flex-direction: column;
      }

      .connection {
        text-align: left;
      }

      .row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      button.icon-btn {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main id="appRoot" class="app">
    <section class="panel brand">
      <div>
        <h1>Unisonmusic</h1>
        <p>Синхронный старт одного трека на нескольких устройствах через комнату.</p>
      </div>
      <div class="connection"><span id="connectionDot" class="dot"></span><span id="connectionText">Подключение</span></div>
    </section>

    <section class="panel stack">
      <h2 class="section-title">Комната</h2>
      <button id="createRoomButton">Создать комнату</button>
      <div class="row">
        <input id="roomCodeInput" inputmode="numeric" maxlength="4" placeholder="Ввести код комнаты">
        <button id="joinRoomButton" class="secondary">Войти</button>
      </div>
      <div id="roomCode" class="room-code">---</div>
      <div id="roomMeta" class="meta">Комната еще не выбрана.</div>

      <h2 class="section-title">Трек</h2>
      <div class="row">
        <input id="trackUrlInput" type="url" placeholder="URL музыки со стримингового сервиса">
        <button id="pasteUrlButton" class="secondary icon-btn" type="button" title="Вставить URL из буфера обмена">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          <span>Вставить</span>
        </button>
        <button id="setTrackButton" class="secondary" disabled>Загрузить</button>
      </div>
      <div id="trackTitle" class="track-title">Трек еще не выбран.</div>
      <audio id="audio" class="player" preload="auto" controls></audio>

      <div class="row">
        <button id="startButton" class="warning" disabled>Начать</button>
        <button id="stopButton" class="secondary" disabled>Остановить</button>
        <button id="continueButton" class="secondary" disabled>Продолжить</button>
      </div>
      <div id="countdown" class="countdown">Ожидание</div>
      <div id="status" class="status">Подключаемся к SignalR...</div>
    </section>

    <aside class="panel stack">
      <h2 class="section-title">Участники</h2>
      <ul id="participants" class="participants"></ul>
    </aside>
  </main>

  <div id="uploadOverlay" class="busy-overlay" hidden>
    <div class="busy-dialog" role="alertdialog" aria-modal="true" aria-labelledby="uploadOverlayTitle">
      <div class="busy-ring" aria-hidden="true"></div>
      <p id="uploadOverlayTitle" class="busy-title">Загружаем трек</p>
      <p class="busy-text">Скачиваем музыку и готовим ее для синхронного воспроизведения.</p>
      <button id="cancelUploadButton" class="secondary" type="button">Отмена</button>
    </div>
  </div>

  <script>
    //const hubUrl = "http://192.168.0.47:5113/hubs/music";
    const hubUrl = "https://api.cloud-platform.pro/unisonmusic/hubs/music";
    const uploadFromUrlEndpoint = "https://api.cloud-platform.pro/unisonmusic/file/upload-from-url";

    const connectionDot = document.getElementById("connectionDot");
    const connectionText = document.getElementById("connectionText");
    const createRoomButton = document.getElementById("createRoomButton");
    const joinRoomButton = document.getElementById("joinRoomButton");
    const roomCodeInput = document.getElementById("roomCodeInput");
    const roomCode = document.getElementById("roomCode");
    const roomMeta = document.getElementById("roomMeta");
    const trackUrlInput = document.getElementById("trackUrlInput");
    const pasteUrlButton = document.getElementById("pasteUrlButton");
    const setTrackButton = document.getElementById("setTrackButton");
    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const continueButton = document.getElementById("continueButton");
    const participants = document.getElementById("participants");
    const statusBox = document.getElementById("status");
    const trackTitle = document.getElementById("trackTitle");
    const uploadOverlay = document.getElementById("uploadOverlay");
    const cancelUploadButton = document.getElementById("cancelUploadButton");
    const appRoot = document.getElementById("appRoot");
    const countdown = document.getElementById("countdown");
    const audio = document.getElementById("audio");
    const clockSyncIntervalMs = 30000;
    const playbackCorrectionIntervalMs = 1000;
    const softSyncThresholdSeconds = 0.04;
    const hardSyncThresholdSeconds = 0.45;
    const playbackRateAdjustment = 0.02;

    let currentRoom = null;
    let clockOffsetMs = 0;
    let clockSyncTimer = null;
    let clockSyncInProgress = false;
    let countdownTimer = null;
    let startTimeout = null;
    let pausedPositionSeconds = null;
    let playbackActive = false;
    let playbackCorrectionTimer = null;
    let playbackSyncStartAtMs = null;
    let playbackSyncStartPositionSeconds = 0;
    let trackUploadInProgress = false;
    let trackUploadAbortController = null;

    const connection = new signalR.HubConnectionBuilder()
      .withUrl(hubUrl, { withCredentials: true })
      .withAutomaticReconnect([0, 1000, 3000, 7000, 12000])
      .configureLogging(signalR.LogLevel.Information)
      .build();

    connection.on("RoomJoined", snapshot => {
      renderRoom(snapshot);
      setStatus(`Вы вошли в комнату ${snapshot.roomCode}.`);
    });

    connection.on("RoomUpdated", snapshot => {
      renderRoom(snapshot);
    });

    connection.on("UserReadyUpdate", snapshot => {
      renderRoom(snapshot);
      setStatus(snapshot.allReady ? "Сервер назначает старт..." : "Комната обновлена.");
    });

    connection.on("TrackUpdated", snapshot => {
      renderRoom(snapshot);
      prepareAudio(snapshot.trackUrl);
      setStatus("Трек загружен у участников.");
    });

    connection.on("ReceiveStartTime", command => {
      scheduleLocalPlayback(command.startAt, command.positionSeconds);
    });

    connection.on("ReceivePause", command => {
      stopLocalPlayback(command.positionSeconds);
    });

    connection.onreconnecting(() => {
      updateConnectionState("Переподключение", "disconnected");
      stopClockSync();
      setControlsEnabled(false);
    });

    connection.onreconnected(async () => {
      updateConnectionState("Подключено", "connected");
      setControlsEnabled(Boolean(currentRoom));
      await syncClock();
      startClockSync();
      setStatus("Соединение восстановлено.");
    });

    connection.onclose(() => {
      updateConnectionState("Отключено", "disconnected");
      stopClockSync();
      setControlsEnabled(false);
      setStatus("SignalR соединение закрыто.", true);
    });

    createRoomButton.addEventListener("click", async () => {
      await invokeHub("CreateRoom", await getClientDeviceInfo());
    });

    joinRoomButton.addEventListener("click", async () => {
      const code = roomCodeInput.value.trim();
      if (!/^\d{3,4}$/.test(code)) {
        setStatus("Введите 3- или 4-значный код комнаты.", true);
        return;
      }

      await invokeHub("JoinRoom", code, await getClientDeviceInfo());
    });

    setTrackButton.addEventListener("click", async () => {
      const url = trackUrlInput.value.trim();
      if (!url) {
        setStatus("Укажите URL трека.", true);
        return;
      }

      trackUploadAbortController = new AbortController();
      setTrackUploadInProgress(true);
      setStatus("Загружаем трек из стримингового сервиса...");

      try {
        const uploadedTrack = await uploadTrackFromUrl(url, trackUploadAbortController.signal);
        const s3Url = uploadedTrack.s3Url || uploadedTrack.S3Url;
        const sourceUrl = uploadedTrack.url || uploadedTrack.Url || url;
        const title = uploadedTrack.trackTitle || uploadedTrack.TrackTitle || "";

        if (!s3Url) {
          throw new Error("Сервер не вернул S3 URL трека.");
        }

        trackUrlInput.value = sourceUrl;
        prepareAudio(s3Url, title);

        const snapshot = await invokeHub("SetTrack", s3Url, title, sourceUrl);
        if (snapshot) {
          setStatus("Трек загружен и готов к воспроизведению.");
        }
      } catch (error) {
        if (error.name === "AbortError") {
          setStatus("Загрузка отменена.", true);
        } else {
          setStatus(error.message || "Не удалось загрузить трек.", true);
        }
      } finally {
        trackUploadAbortController = null;
        setTrackUploadInProgress(false);
      }
    });

    cancelUploadButton.addEventListener("click", () => {
      trackUploadAbortController?.abort();
      setTrackUploadInProgress(false);
      setStatus("Отменяем загрузку...");
    });

    pasteUrlButton.addEventListener("click", async () => {
      try {
        const text = await navigator.clipboard.readText();
        if (!text) {
          setStatus("Буфер обмена пуст.", true);
          return;
        }
        trackUrlInput.value = text.trim();
        trackUrlInput.dispatchEvent(new Event("input"));
        pasteUrlButton.classList.add("pasted");
        setStatus("URL вставлен из буфера обмена.");
        setTimeout(() => pasteUrlButton.classList.remove("pasted"), 1500);
      } catch {
        setStatus("Нет доступа к буферу обмена. Вставьте вручную (Ctrl+V).", true);
      }
    });

    startButton.addEventListener("click", async () => {
      await unlockAudio();
      playbackActive = true;
      setControlsEnabled(Boolean(currentRoom));

      const command = await invokeHub("StartPlayback");
      if (!command) {
        playbackActive = false;
        setControlsEnabled(Boolean(currentRoom));
      }
    });

    stopButton.addEventListener("click", async () => {
      await invokeHub("PausePlayback", audio.currentTime || 0);
    });

    continueButton.addEventListener("click", async () => {
      if (pausedPositionSeconds === null) {
        setStatus("Сначала остановите воспроизведение.", true);
        return;
      }

      await unlockAudio();
      playbackActive = true;
      setControlsEnabled(Boolean(currentRoom));

      const command = await invokeHub("ContinuePlayback", pausedPositionSeconds);
      if (!command) {
        playbackActive = false;
        setControlsEnabled(Boolean(currentRoom));
      }
    });

    roomCodeInput.addEventListener("input", () => {
      roomCodeInput.value = roomCodeInput.value.replace(/\D/g, "").slice(0, 4);
    });

    audio.addEventListener("ended", () => {
      stopPlaybackCorrection();
      playbackActive = false;
      pausedPositionSeconds = null;
      setControlsEnabled(Boolean(currentRoom));
    });

    start();

    async function start() {
      try {
        await connection.start();
        updateConnectionState("Подключено", "connected");
        await syncClock();
        startClockSync();
        setStatus("SignalR подключен. Создайте комнату или войдите по коду.");
      } catch (error) {
        updateConnectionState("Ошибка", "disconnected");
        setStatus(`Не удалось подключиться: ${error.message}`, true);
        setTimeout(start, 3000);
      }
    }

    async function getClientDeviceInfo() {
      const userAgentData = navigator.userAgentData;

      if (!userAgentData || typeof userAgentData.getHighEntropyValues !== "function") {
        return null;
      }

      try {
        const hints = await userAgentData.getHighEntropyValues(["model", "platform", "platformVersion"]);
        const deviceType = userAgentData.mobile ? "Телефон" : null;
        const model = cleanClientHintValue(hints.model);
        const os = formatClientHintsOs(hints.platform, hints.platformVersion);

        if (!deviceType && !model && !os) {
          return null;
        }

        return {
          DeviceType: deviceType,
          Model: model,
          Os: os
        };
      } catch {
        return null;
      }
    }

    function formatClientHintsOs(platform, platformVersion) {
      const os = cleanClientHintValue(platform);
      const version = cleanClientHintValue(platformVersion);

      if (!os) {
        return null;
      }

      if (os.toLowerCase() === "android" && version) {
        return `Android ${version}`;
      }

      if (os.toLowerCase() === "ios" && version) {
        return `iOS ${version.replaceAll("_", ".")}`;
      }

      if (os.toLowerCase() === "macos") {
        return "macOS";
      }

      return os;
    }

    function cleanClientHintValue(value) {
      if (!value || typeof value !== "string") {
        return null;
      }

      const cleaned = value.trim();
      return cleaned ? cleaned : null;
    }

    async function invokeHub(method, ...args) {
      try {
        return await connection.invoke(method, ...args);
      } catch (error) {
        setStatus(error.message || "Ошибка SignalR запроса.", true);
        return null;
      }
    }

    async function syncClock() {
      if (clockSyncInProgress || connection.state !== signalR.HubConnectionState.Connected) {
        return;
      }

      clockSyncInProgress = true;
      const samples = [];

      try {
        for (let i = 0; i < 5; i += 1) {
          const sentAt = Date.now();
          const serverTime = await connection.invoke("GetServerTime");
          const receivedAt = Date.now();
          const rtt = receivedAt - sentAt;
          const serverMs = new Date(serverTime).getTime();

          samples.push({
            offsetMs: serverMs + rtt / 2 - receivedAt,
            rtt
          });
        }

        samples.sort((a, b) => a.rtt - b.rtt);
        clockOffsetMs = samples[0]?.offsetMs ?? clockOffsetMs;
      } finally {
        clockSyncInProgress = false;
      }
    }

    function startClockSync() {
      stopClockSync();
      clockSyncTimer = setInterval(() => {
        syncClock().catch(() => {});
      }, clockSyncIntervalMs);
    }

    function stopClockSync() {
      clearInterval(clockSyncTimer);
      clockSyncTimer = null;
    }

    function renderRoom(snapshot) {
      currentRoom = snapshot;
      roomCode.textContent = snapshot.roomCode;
      trackUrlInput.value = snapshot.trackSourceUrl || trackUrlInput.value;
      renderTrackTitle(snapshot.trackTitle);
      roomMeta.textContent = `${snapshot.users.length} участник(ов).`;

      if (snapshot.trackUrl && audio.src !== snapshot.trackUrl) {
        prepareAudio(snapshot.trackUrl, snapshot.trackTitle);
      }

      participants.innerHTML = "";
      snapshot.users.forEach(user => {
        const li = document.createElement("li");
        li.className = "participant";
        li.innerHTML = `<span>${escapeHtml(user.name)}</span>`;
        participants.appendChild(li);
      });

      if (snapshot.users.length === 0) {
        participants.innerHTML = '<li class="participant"><span>Пока никого нет</span></li>';
      }

      setControlsEnabled(true);
    }

    function setControlsEnabled(joinedRoom) {
      const connected = connection.state === signalR.HubConnectionState.Connected;
      pasteUrlButton.disabled = !connected || !joinedRoom || trackUploadInProgress;
      setTrackButton.disabled = !connected || !joinedRoom || trackUploadInProgress;
      startButton.disabled = !connected || !joinedRoom || !audio.src || playbackActive;
      stopButton.disabled = !connected || !joinedRoom || !audio.src || !playbackActive;
      continueButton.disabled = !connected || !joinedRoom || !audio.src || pausedPositionSeconds === null || playbackActive;
    }

    async function uploadTrackFromUrl(url, signal) {
      const response = await fetch(uploadFromUrlEndpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ url }),
        signal
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(errorText || `Ошибка загрузки трека: ${response.status}`);
      }

      return response.json();
    }

    function setTrackUploadInProgress(inProgress) {
      trackUploadInProgress = inProgress;
      document.body.classList.toggle("busy", inProgress);
      appRoot.inert = inProgress;
      appRoot.setAttribute("aria-busy", String(inProgress));
      uploadOverlay.hidden = !inProgress;
      uploadOverlay.classList.toggle("active", inProgress);
      setTrackButton.classList.toggle("loading", inProgress);
      setTrackButton.innerHTML = inProgress
        ? '<span class="spinner" aria-hidden="true"></span><span>Загрузка</span>'
        : "Загрузить";
      cancelUploadButton.disabled = !inProgress;
      setControlsEnabled(Boolean(currentRoom));
    }

    function prepareAudio(url, title = "") {
      if (!url) {
        return;
      }

      audio.src = url;
      audio.preload = "auto";
      audio.load();
      stopPlaybackCorrection();
      pausedPositionSeconds = null;
      playbackActive = false;
      renderTrackTitle(title);
      setControlsEnabled(Boolean(currentRoom));
    }

    function renderTrackTitle(title) {
      trackTitle.textContent = title?.trim()
        ? `Сейчас выбран: ${title.trim()}`
        : "Трек еще не выбран.";
    }

    async function unlockAudio() {
      if (!audio.src) {
        return;
      }

      const wasMuted = audio.muted;

      try {
        audio.muted = true;
        await audio.play();
        audio.pause();
        audio.currentTime = 0;
      } catch {
        // Browser may block autoplay; a manual click on the audio controls will unlock it.
      } finally {
        audio.muted = wasMuted;
      }
    }

    function scheduleLocalPlayback(startAt, positionSeconds = 0) {
      clearInterval(countdownTimer);
      clearTimeout(startTimeout);
      stopPlaybackCorrection();

      const startPosition = Math.max(0, Number(positionSeconds) || 0);
      setAudioPosition(startPosition);
      pausedPositionSeconds = null;
      playbackActive = true;
      setControlsEnabled(Boolean(currentRoom));

      const startAtMs = new Date(startAt).getTime();
      const delay = Math.max(0, startAtMs - (Date.now() + clockOffsetMs));

      setStatus(`Старт с ${startPosition.toFixed(1)} сек назначен на ${new Date(startAt).toLocaleTimeString("ru-RU", { timeZone: "UTC" })} UTC.`);
      renderCountdown(delay);

      countdownTimer = setInterval(() => {
        const leftMs = Math.max(0, startAtMs - (Date.now() + clockOffsetMs));
        renderCountdown(leftMs);
      }, 100);

      startTimeout = setTimeout(async () => {
        clearInterval(countdownTimer);
        countdown.textContent = "Старт";

        try {
          const elapsedSeconds = Math.max(0, ((Date.now() + clockOffsetMs) - startAtMs) / 1000);
          const targetPosition = startPosition + elapsedSeconds;
          setAudioPosition(targetPosition);
          await audio.play();
          startPlaybackCorrection(startAtMs, startPosition);
          setStatus("Воспроизведение запущено.");
        } catch (error) {
          stopPlaybackCorrection();
          playbackActive = false;
          setControlsEnabled(Boolean(currentRoom));
          setStatus(`Браузер заблокировал запуск: ${error.message}`, true);
        }
      }, delay);
    }

    function stopLocalPlayback(positionSeconds) {
      clearInterval(countdownTimer);
      clearTimeout(startTimeout);
      stopPlaybackCorrection();

      const targetPosition = Math.max(0, Number(positionSeconds) || 0);
      audio.pause();

      if (audio.src) {
        setAudioPosition(targetPosition);
      }

      pausedPositionSeconds = targetPosition;
      playbackActive = false;
      setControlsEnabled(Boolean(currentRoom));
      countdown.textContent = "Остановлено";
      setStatus(`Воспроизведение остановлено на ${targetPosition.toFixed(1)} сек.`);
    }

    function startPlaybackCorrection(startAtMs, startPositionSeconds) {
      stopPlaybackCorrection();
      playbackSyncStartAtMs = startAtMs;
      playbackSyncStartPositionSeconds = startPositionSeconds;
      playbackCorrectionTimer = setInterval(correctPlaybackPosition, playbackCorrectionIntervalMs);
      correctPlaybackPosition();
    }

    function stopPlaybackCorrection() {
      clearInterval(playbackCorrectionTimer);
      playbackCorrectionTimer = null;
      playbackSyncStartAtMs = null;
      playbackSyncStartPositionSeconds = 0;
      audio.playbackRate = 1;
    }

    function correctPlaybackPosition() {
      if (!playbackActive || playbackSyncStartAtMs === null) {
        return;
      }

      if (audio.paused) {
        audio.playbackRate = 1;
        return;
      }

      const serverNowMs = Date.now() + clockOffsetMs;
      const elapsedSeconds = Math.max(0, (serverNowMs - playbackSyncStartAtMs) / 1000);
      const expectedPosition = playbackSyncStartPositionSeconds + elapsedSeconds;
      const driftSeconds = expectedPosition - audio.currentTime;

      if (!Number.isFinite(driftSeconds)) {
        return;
      }

      if (Math.abs(driftSeconds) >= hardSyncThresholdSeconds) {
        setAudioPosition(expectedPosition);
        audio.playbackRate = 1;
        return;
      }

      if (Math.abs(driftSeconds) >= softSyncThresholdSeconds) {
        audio.playbackRate = driftSeconds > 0
          ? 1 + playbackRateAdjustment
          : 1 - playbackRateAdjustment;
        return;
      }

      audio.playbackRate = 1;
    }

    function setAudioPosition(positionSeconds) {
      const targetPosition = Math.max(0, Number(positionSeconds) || 0);
      audio.currentTime = Math.min(targetPosition, audio.duration || targetPosition);
    }

    function renderCountdown(leftMs) {
      countdown.textContent = leftMs <= 0
        ? "Старт"
        : `${(leftMs / 1000).toFixed(1)} сек`;
    }

    function updateConnectionState(text, stateClass) {
      connectionText.textContent = text;
      connectionDot.className = `dot ${stateClass}`;
    }

    function setStatus(message, isError = false) {
      statusBox.textContent = message;
      statusBox.classList.toggle("error", isError);
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
